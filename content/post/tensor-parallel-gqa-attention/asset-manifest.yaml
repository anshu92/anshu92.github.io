assets:
  - path: cover.svg
    type: svg
    purpose: Introduce the dense-to-two-rank reconstruction.
    alt: Two tensor-parallel ranks each own one complete GQA head group and contribute to a reduced output.
    source: Generated locally by code/generate_visuals.py
    provenance: Original diagram
    article_section: opening
  - path: figures/figure-01-head-groups.svg
    type: svg
    purpose: Show semantic partitioning of query and KV heads.
    alt: Rank zero owns query heads zero and one with KV head zero; rank one owns query heads two and three with KV head one.
    source: Generated locally by code/generate_visuals.py
    provenance: Original diagram
    article_section: First change
  - path: figures/figure-02-equivalence.svg
    type: svg
    purpose: Show why row-parallel output partials require a sum.
    alt: Two local context projections produce full-width partial outputs that are summed before the residual connection.
    source: Generated locally by code/generate_visuals.py
    provenance: Original diagram
    article_section: Second change
  - path: figures/figure-03-failure-signatures.svg
    type: svg
    purpose: Contrast forward and backward communication failures.
    alt: Missing output reduction first changes the forward output, while missing input-gradient reduction first changes the backward gradient.
    source: Generated locally by code/generate_visuals.py
    source_data: data/summary.json
    provenance: Original diagram based on retained experiment results
    article_section: Break forward and backward separately
  - path: data/results.csv
    type: data
    purpose: Retain all fifteen runs across five seeds and three scenarios.
    source: Generated by code/tp_gqa_attention.py
    provenance: Local deterministic experiment
  - path: data/results.json
    type: data
    purpose: Structured copy of all experiment runs.
    source: Generated by code/tp_gqa_attention.py
    provenance: Local deterministic experiment
  - path: data/summary.json
    type: data
    purpose: Retain min and max error ranges used in the article.
    source: Aggregated from data/results.json
    provenance: Local deterministic experiment
