<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#f7f7f4"/><text x="80" y="125" font-family="sans-serif" font-size="48" font-weight="700">The Two Numbers Every</text><text x="80" y="185" font-family="sans-serif" font-size="48" font-weight="700">Distributed Loss Needs</text><rect x="120" y="280" width="360" height="160" rx="20" fill="#e5edf7" stroke="#24364b" stroke-width="3"/><text x="300" y="345" text-anchor="middle" font-family="sans-serif" font-size="30">loss sum</text><text x="300" y="390" text-anchor="middle" font-family="serif" font-size="42">N = Σ ℓᵢ</text><rect x="720" y="280" width="360" height="160" rx="20" fill="#eef0df" stroke="#3d4924" stroke-width="3"/><text x="900" y="345" text-anchor="middle" font-family="sans-serif" font-size="30">valid-token count</text><text x="900" y="390" text-anchor="middle" font-family="serif" font-size="42">D = Σ mᵢ</text><path d="M480 360 L720 360" stroke="#333" stroke-width="4" marker-end="url(#a)"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs><text x="600" y="520" text-anchor="middle" font-family="serif" font-size="48">L = N / D</text></svg>