<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540"><rect width="1000" height="540" fill="white"/><text x="500" y="40" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700">The invariant follows two numbers</text><g font-family="sans-serif"><text x="80" y="95" font-size="22">microbatch / rank</text><g fill="#e5edf7" stroke="#24364b"><rect x="80" y="120" width="180" height="90"/><rect x="80" y="245" width="180" height="90"/><rect x="80" y="370" width="180" height="90"/></g><g font-size="20"><text x="170" y="155" text-anchor="middle">N₀ = Σ loss</text><text x="170" y="185" text-anchor="middle">D₀ = valid tokens</text><text x="170" y="280" text-anchor="middle">N₁ = Σ loss</text><text x="170" y="310" text-anchor="middle">D₁ = valid tokens</text><text x="170" y="405" text-anchor="middle">N₂ = Σ loss</text><text x="170" y="435" text-anchor="middle">D₂ = valid tokens</text></g><path d="M270 165 L500 250" stroke="#333" stroke-width="3"/><path d="M270 290 L500 250" stroke="#333" stroke-width="3"/><path d="M270 415 L500 250" stroke="#333" stroke-width="3"/><rect x="500" y="185" width="220" height="130" fill="#eef0df" stroke="#3d4924" stroke-width="3"/><text x="610" y="225" text-anchor="middle" font-size="21">SUM both statistics</text><text x="610" y="260" text-anchor="middle" font-size="22">N = Σᵣ Nᵣ</text><text x="610" y="292" text-anchor="middle" font-size="22">D = Σᵣ Dᵣ</text><path d="M720 250 L850 250" stroke="#333" stroke-width="3"/><text x="910" y="235" text-anchor="middle" font-family="serif" font-size="30">L = N/D</text><text x="910" y="278" text-anchor="middle" font-size="18">one scalar objective</text></g></svg>