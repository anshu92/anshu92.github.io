<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500"><rect width="1000" height="500" fill="white"/><text x="500" y="45" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700">Equal rank weight is not equal token weight</text><text x="80" y="100" font-family="sans-serif" font-size="22">Rank 0: 1 valid token</text><rect x="80" y="125" width="110" height="70" fill="#f7c9c9" stroke="#333"/><text x="135" y="168" text-anchor="middle" font-family="sans-serif" font-size="20">loss 2.0</text><text x="80" y="260" font-family="sans-serif" font-size="22">Rank 1: 3 valid tokens</text><g fill="#cfe5cf" stroke="#333"><rect x="80" y="285" width="110" height="70"/><rect x="200" y="285" width="110" height="70"/><rect x="320" y="285" width="110" height="70"/></g><g font-family="sans-serif" font-size="20"><text x="135" y="328" text-anchor="middle">0.2</text><text x="255" y="328" text-anchor="middle">0.2</text><text x="375" y="328" text-anchor="middle">0.2</text><text x="600" y="175">Wrong: (2.0 + 0.2) / 2 = 1.1</text><text x="600" y="235">Correct: (2.0 + 0.6) / 4 = 0.65</text><text x="600" y="315" font-weight="700">The denominator decides the objective.</text></g></svg>