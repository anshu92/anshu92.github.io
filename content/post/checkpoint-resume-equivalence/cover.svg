<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">A Restart Is Not a Resume</title>
<desc id="desc">Two training timelines meet at a checkpoint. A complete payload continues along the control trajectory while an incomplete payload branches after the next affected transition.</desc>
<rect width="100%" height="100%" fill="#F8F6F1"/>
<text x="70" y="82" font-family="Inter,Arial,sans-serif" font-size="48" font-weight="750" fill="#17212B" text-anchor="start">A restart is not a resume</text><text x="70" y="121" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="500" fill="#B34D2E" text-anchor="start">The checkpoint equivalence test</text><text x="90" y="220" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#17212B" text-anchor="start">uninterrupted control</text><line x1="90" y1="260" x2="1110" y2="260" stroke="#286C72" stroke-width="8" stroke-linecap="round"/><circle cx="150" cy="260" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="270" cy="260" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="390" cy="260" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="525" cy="260" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="680" cy="260" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="840" cy="260" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="1010" cy="260" r="10" fill="#286C72" stroke="none" stroke-width="0"/><text x="90" y="414" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#17212B" text-anchor="start">interrupted run</text><line x1="90" y1="455" x2="525" y2="455" stroke="#286C72" stroke-width="8" stroke-linecap="round"/><circle cx="150" cy="455" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="270" cy="455" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="390" cy="455" r="10" fill="#286C72" stroke="none" stroke-width="0"/><circle cx="525" cy="455" r="10" fill="#286C72" stroke="none" stroke-width="0"/><line x1="525" y1="180" x2="525" y2="535" stroke="#5C6873" stroke-width="3" stroke-linecap="round" stroke-dasharray="9 9"/><text x="525" y="165" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700" fill="#5C6873" text-anchor="middle">save / load</text><line x1="525" y1="455" x2="650" y2="355" stroke="#2E7D55" stroke-width="7" stroke-linecap="round"/><line x1="650" y1="355" x2="1110" y2="355" stroke="#2E7D55" stroke-width="7" stroke-linecap="round"/><text x="705" y="398" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#2E7D55" text-anchor="start">complete payload: same future transition</text><line x1="525" y1="455" x2="660" y2="520" stroke="#B23A48" stroke-width="7" stroke-linecap="round"/><line x1="660" y1="520" x2="1110" y2="590" stroke="#B23A48" stroke-width="7" stroke-linecap="round"/><text x="705" y="505" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#B23A48" text-anchor="start">missing state: branch appears later</text><rect x="735" y="150" width="290" height="210" rx="22" fill="#FFFFFF" stroke="#2E7D55" stroke-width="4"/><text x="759" y="186" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#2E7D55" text-anchor="start">checkpoint payload</text><circle cx="763" cy="214" r="7" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="780" y="220" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500" fill="#17212B" text-anchor="start">model + optimizer</text><circle cx="763" cy="240" r="7" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="780" y="246" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500" fill="#17212B" text-anchor="start">scheduler</text><circle cx="763" cy="266" r="7" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="780" y="272" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500" fill="#17212B" text-anchor="start">RNG + data cursor</text><circle cx="763" cy="292" r="7" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="780" y="298" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500" fill="#17212B" text-anchor="start">partial gradients (mid-step)</text><text x="70" y="635" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="600" fill="#17212B" text-anchor="start">A successful load only proves deserialization. The next update is the test.</text>
</svg>
