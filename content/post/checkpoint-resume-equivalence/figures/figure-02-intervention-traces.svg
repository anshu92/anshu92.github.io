<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
<title id="title">Failure traces for checkpoint-state omissions</title>
<desc id="desc">A representative experiment trace shows complete boundary recovery overlapping the control. Missing RNG, data stream, or partial gradients branches at step six, while a missing scheduler branches at step nine.</desc>
<rect width="100%" height="100%" fill="#F8F6F1"/>
<text x="60" y="65" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="750" fill="#17212B" text-anchor="start">Where each omission first changed the run</text><text x="60" y="103" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="400" fill="#5C6873" text-anchor="start">Representative seed 11. The vertical distance encodes branch visibility, not loss magnitude.</text><rect x="120" y="170" width="1000" height="510" rx="16" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="2"/><line x1="120.0" y1="190" x2="120.0" y2="635" stroke="#D9D6CF" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 8"/><text x="120.0" y="665" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#5C6873" text-anchor="middle">5</text><line x1="262.8571428571429" y1="190" x2="262.8571428571429" y2="635" stroke="#D9D6CF" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 8"/><text x="262.8571428571429" y="665" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#5C6873" text-anchor="middle">6</text><line x1="405.7142857142857" y1="190" x2="405.7142857142857" y2="635" stroke="#D9D6CF" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 8"/><text x="405.7142857142857" y="665" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#5C6873" text-anchor="middle">7</text><line x1="548.5714285714286" y1="190" x2="548.5714285714286" y2="635" stroke="#D9D6CF" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 8"/><text x="548.5714285714286" y="665" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#5C6873" text-anchor="middle">8</text><line x1="691.4285714285714" y1="190" x2="691.4285714285714" y2="635" stroke="#D9D6CF" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 8"/><text x="691.4285714285714" y="665" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#5C6873" text-anchor="middle">9</text><line x1="834.2857142857143" y1="190" x2="834.2857142857143" y2="635" stroke="#D9D6CF" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 8"/><text x="834.2857142857143" y="665" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#5C6873" text-anchor="middle">10</text><line x1="977.1428571428571" y1="190" x2="977.1428571428571" y2="635" stroke="#D9D6CF" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 8"/><text x="977.1428571428571" y="665" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#5C6873" text-anchor="middle">11</text><line x1="1120.0" y1="190" x2="1120.0" y2="635" stroke="#D9D6CF" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 8"/><text x="1120.0" y="665" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#5C6873" text-anchor="middle">12</text><text x="620.0" y="735" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600" fill="#5C6873" text-anchor="middle">optimizer step</text><line x1="120" y1="270" x2="1120" y2="270" stroke="#286C72" stroke-width="6" stroke-linecap="round"/><text x="135" y="246" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700" fill="#286C72" text-anchor="start">uninterrupted control</text><line x1="120" y1="150" x2="120" y2="680" stroke="#5C6873" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/><text x="120" y="145" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#5C6873" text-anchor="middle">checkpoint after step 5</text><line x1="120" y1="270" x2="1120" y2="270" stroke="#2E7D55" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 8"/><text x="1105" y="255" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#2E7D55" text-anchor="end">overlaps control through step 12</text><line x1="120" y1="270" x2="262.8571428571429" y2="270" stroke="#B23A48" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/><line x1="262.8571428571429" y1="270" x2="357.8571428571429" y2="360" stroke="#B23A48" stroke-width="5" stroke-linecap="round"/><line x1="357.8571428571429" y1="360" x2="1105" y2="360" stroke="#B23A48" stroke-width="5" stroke-linecap="round"/><circle cx="262.8571428571429" cy="270" r="9" fill="#B23A48" stroke="none" stroke-width="0"/><text x="1095" y="348" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#B23A48" text-anchor="end">omit RNG: first branch at step 6</text><line x1="120" y1="270" x2="262.8571428571429" y2="270" stroke="#B34D2E" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/><line x1="262.8571428571429" y1="270" x2="357.8571428571429" y2="445" stroke="#B34D2E" stroke-width="5" stroke-linecap="round"/><line x1="357.8571428571429" y1="445" x2="1105" y2="445" stroke="#B34D2E" stroke-width="5" stroke-linecap="round"/><circle cx="262.8571428571429" cy="270" r="9" fill="#B34D2E" stroke="none" stroke-width="0"/><text x="1095" y="433" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#B34D2E" text-anchor="end">omit data stream: first branch at step 6</text><line x1="120" y1="270" x2="691.4285714285714" y2="270" stroke="#7A4EAB" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/><line x1="691.4285714285714" y1="270" x2="786.4285714285714" y2="530" stroke="#7A4EAB" stroke-width="5" stroke-linecap="round"/><line x1="786.4285714285714" y1="530" x2="1105" y2="530" stroke="#7A4EAB" stroke-width="5" stroke-linecap="round"/><circle cx="691.4285714285714" cy="270" r="9" fill="#7A4EAB" stroke="none" stroke-width="0"/><text x="1095" y="518" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#7A4EAB" text-anchor="end">omit scheduler: first branch at step 9</text><line x1="120" y1="270" x2="262.8571428571429" y2="270" stroke="#8B5E34" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/><line x1="262.8571428571429" y1="270" x2="357.8571428571429" y2="615" stroke="#8B5E34" stroke-width="5" stroke-linecap="round"/><line x1="357.8571428571429" y1="615" x2="1105" y2="615" stroke="#8B5E34" stroke-width="5" stroke-linecap="round"/><circle cx="262.8571428571429" cy="270" r="9" fill="#8B5E34" stroke="none" stroke-width="0"/><text x="1095" y="603" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#8B5E34" text-anchor="end">mid-save, no gradients: first branch at step 6</text><text x="60" y="785" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="500" fill="#17212B" text-anchor="start"><tspan x="60" dy="0">Observation: stochastic and data omissions branch on the first resumed update.</tspan><tspan x="60" dy="28">The scheduler omission waits until its shifted decay boundary at step 9.</tspan></text>
</svg>
