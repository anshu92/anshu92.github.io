<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="880" viewBox="0 0 1200 880" role="img" aria-labelledby="title desc">
<title id="title">Checkpoint state surface in the experiment</title>
<desc id="desc">Four groups of state cross the interruption boundary: update state, stochastic state, data state, and partial-step state. Partial gradients are required only for mid-accumulation saves.</desc>
<rect width="100%" height="100%" fill="#F8F6F1"/>
<text x="60" y="70" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="750" fill="#17212B" text-anchor="start">What crosses the interruption boundary?</text><text x="60" y="108" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="400" fill="#5C6873" text-anchor="start">The fixture saves the inputs needed to reproduce the next transition—not only the visible weights.</text><rect x="60" y="170" width="510" height="245" rx="20" fill="#FFFFFF" stroke="#286C72" stroke-width="3"/><text x="86" y="212" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="750" fill="#286C72" text-anchor="start">Update state</text><circle cx="90" cy="249" r="7" fill="#286C72" stroke="none" stroke-width="0"/><text x="110" y="256" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">model parameters + buffers</text><circle cx="90" cy="295" r="7" fill="#286C72" stroke="none" stroke-width="0"/><text x="110" y="302" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">optimizer moments</text><circle cx="90" cy="341" r="7" fill="#286C72" stroke="none" stroke-width="0"/><text x="110" y="348" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">scheduler clock</text><rect x="610" y="170" width="510" height="245" rx="20" fill="#FFFFFF" stroke="#B34D2E" stroke-width="3"/><text x="636" y="212" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="750" fill="#B34D2E" text-anchor="start">Stochastic state</text><circle cx="640" cy="249" r="7" fill="#B34D2E" stroke="none" stroke-width="0"/><text x="660" y="256" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">Python RNG</text><circle cx="640" cy="295" r="7" fill="#B34D2E" stroke="none" stroke-width="0"/><text x="660" y="302" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">NumPy RNG</text><circle cx="640" cy="341" r="7" fill="#B34D2E" stroke="none" stroke-width="0"/><text x="660" y="348" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">PyTorch CPU RNG</text><rect x="60" y="455" width="510" height="245" rx="20" fill="#FFFFFF" stroke="#2E7D55" stroke-width="3"/><text x="86" y="497" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="750" fill="#2E7D55" text-anchor="start">Data state</text><circle cx="90" cy="534" r="7" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="110" y="541" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">epoch + cursor</text><circle cx="90" cy="580" r="7" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="110" y="587" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">current permutation</text><circle cx="90" cy="626" r="7" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="110" y="633" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">permutation-generator state</text><rect x="610" y="455" width="510" height="245" rx="20" fill="#FFFFFF" stroke="#B23A48" stroke-width="3"/><text x="636" y="497" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="750" fill="#B23A48" text-anchor="start">Partial-step state</text><circle cx="640" cy="534" r="7" fill="#B23A48" stroke="none" stroke-width="0"/><text x="660" y="541" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">accumulation position</text><circle cx="640" cy="580" r="7" fill="#B23A48" stroke="none" stroke-width="0"/><text x="660" y="587" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">parameter gradients</text><circle cx="640" cy="626" r="7" fill="#B23A48" stroke="none" stroke-width="0"/><text x="660" y="633" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="500" fill="#17212B" text-anchor="start">global microstep</text><text x="636" y="680" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500" fill="#5C6873" text-anchor="start">Needed only when the save cuts through accumulation.</text><line x1="60" y1="748" x2="1140" y2="748" stroke="#D9D6CF" stroke-width="2" stroke-linecap="round"/><text x="60" y="785" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#2E7D55" text-anchor="start">Boundary save</text><text x="60" y="815" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="400" fill="#17212B" text-anchor="start"><tspan x="60" dy="0">Update + stochastic + data state,</tspan><tspan x="60" dy="24">with counters at a clean optimizer-step boundary.</tspan></text><text x="620" y="785" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#B23A48" text-anchor="start">Mid-accumulation save</text><text x="620" y="815" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="400" fill="#17212B" text-anchor="start"><tspan x="620" dy="0">The same payload plus partial gradients</tspan><tspan x="620" dy="24">and the accumulation position.</tspan></text>
</svg>
