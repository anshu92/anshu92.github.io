<text x="36" y="96" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="18" fill="#7EE787">$ python code/checkpoint_equivalence.py trace --seed 11 --scenario omit_scheduler</text>
