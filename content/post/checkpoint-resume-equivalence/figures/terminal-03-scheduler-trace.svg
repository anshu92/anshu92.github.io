<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="448" viewBox="0 0 1120 448" role="img" aria-labelledby="title desc">
<title id="title">Tracing the delayed scheduler failure</title>
<desc id="desc">Actual terminal transcript showing the control and resumed learning rates. The learning rate differs at step eight while parameters still match; model parameters first differ at step nine.</desc>
