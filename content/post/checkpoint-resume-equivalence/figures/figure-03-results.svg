<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="930" viewBox="0 0 1200 930" role="img" aria-labelledby="title desc">
<title id="title">Aggregate checkpoint equivalence results</title>
<desc id="desc">Seven checkpoint scenarios were run across five seeds. Both complete payload scenarios matched exactly in all five runs. Every incomplete payload scenario failed in all five runs, with nonzero final parameter error.</desc>
<rect width="100%" height="100%" fill="#F8F6F1"/>
<text x="60" y="62" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="750" fill="#17212B" text-anchor="start"><tspan x="60" dy="0">Five-seed result: complete payloads matched;</tspan><tspan x="60" dy="42">every planted omission failed</tspan></text><text x="60" y="145" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="400" fill="#5C6873" text-anchor="start"><tspan x="60" dy="0">Exact means model, optimizer, scheduler, stream, RNG, gradients,</tspan><tspan x="60" dy="27">and the next batch all matched the uninterrupted control.</tspan></text><text x="570" y="215" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#5C6873" text-anchor="middle">exact runs</text><text x="917.5" y="215" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#5C6873" text-anchor="middle">median final max |parameter error| (log scale)</text><rect x="45" y="227" width="1110" height="64" rx="12" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="1"/><text x="65" y="270" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650" fill="#17212B" text-anchor="start">Full boundary payload</text><text x="570" y="270" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750" fill="#2E7D55" text-anchor="middle">5/5</text><line x1="720" y1="264" x2="1115" y2="264" stroke="#D9D6CF" stroke-width="8" stroke-linecap="round"/><circle cx="720" cy="264" r="9" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="738" y="270" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#2E7D55" text-anchor="start">0 (bitwise match)</text><rect x="45" y="309" width="1110" height="64" rx="12" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="1"/><text x="65" y="352" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650" fill="#17212B" text-anchor="start">Full mid-accumulation payload</text><text x="570" y="352" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750" fill="#2E7D55" text-anchor="middle">5/5</text><line x1="720" y1="346" x2="1115" y2="346" stroke="#D9D6CF" stroke-width="8" stroke-linecap="round"/><circle cx="720" cy="346" r="9" fill="#2E7D55" stroke="none" stroke-width="0"/><text x="738" y="352" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#2E7D55" text-anchor="start">0 (bitwise match)</text><rect x="45" y="391" width="1110" height="64" rx="12" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="1"/><text x="65" y="434" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650" fill="#17212B" text-anchor="start">Model + optimizer only</text><text x="570" y="434" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750" fill="#B23A48" text-anchor="middle">0/5</text><line x1="720" y1="428" x2="1115" y2="428" stroke="#D9D6CF" stroke-width="8" stroke-linecap="round"/><line x1="720" y1="428" x2="1115.0" y2="428" stroke="#B23A48" stroke-width="8" stroke-linecap="round"/><circle cx="1115.0" cy="428" r="9" fill="#B23A48" stroke="none" stroke-width="0"/><text x="1101.0" y="417" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="700" fill="#B23A48" text-anchor="end">8.740e-02</text><rect x="45" y="473" width="1110" height="64" rx="12" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="1"/><text x="65" y="516" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650" fill="#17212B" text-anchor="start">Omit RNG</text><text x="570" y="516" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750" fill="#B23A48" text-anchor="middle">0/5</text><line x1="720" y1="510" x2="1115" y2="510" stroke="#D9D6CF" stroke-width="8" stroke-linecap="round"/><line x1="720" y1="510" x2="1107.8512906225462" y2="510" stroke="#B23A48" stroke-width="8" stroke-linecap="round"/><circle cx="1107.8512906225462" cy="510" r="9" fill="#B23A48" stroke="none" stroke-width="0"/><text x="1093.8512906225462" y="499" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="700" fill="#B23A48" text-anchor="end">7.114e-02</text><rect x="45" y="555" width="1110" height="64" rx="12" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="1"/><text x="65" y="598" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650" fill="#17212B" text-anchor="start">Omit data stream</text><text x="570" y="598" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750" fill="#B23A48" text-anchor="middle">0/5</text><line x1="720" y1="592" x2="1115" y2="592" stroke="#D9D6CF" stroke-width="8" stroke-linecap="round"/><line x1="720" y1="592" x2="1109.5534410782143" y2="592" stroke="#B23A48" stroke-width="8" stroke-linecap="round"/><circle cx="1109.5534410782143" cy="592" r="9" fill="#B23A48" stroke="none" stroke-width="0"/><text x="1095.5534410782143" y="581" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="700" fill="#B23A48" text-anchor="end">7.471e-02</text><rect x="45" y="637" width="1110" height="64" rx="12" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="1"/><text x="65" y="680" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650" fill="#17212B" text-anchor="start">Omit scheduler</text><text x="570" y="680" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750" fill="#B23A48" text-anchor="middle">0/5</text><line x1="720" y1="674" x2="1115" y2="674" stroke="#D9D6CF" stroke-width="8" stroke-linecap="round"/><line x1="720" y1="674" x2="1021.6633045404458" y2="674" stroke="#B23A48" stroke-width="8" stroke-linecap="round"/><circle cx="1021.6633045404458" cy="674" r="9" fill="#B23A48" stroke="none" stroke-width="0"/><text x="1007.6633045404458" y="663" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="700" fill="#B23A48" text-anchor="end">5.941e-03</text><rect x="45" y="719" width="1110" height="64" rx="12" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="1"/><text x="65" y="762" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650" fill="#17212B" text-anchor="start">Mid-save without partial gradients</text><text x="570" y="762" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750" fill="#B23A48" text-anchor="middle">0/5</text><line x1="720" y1="756" x2="1115" y2="756" stroke="#D9D6CF" stroke-width="8" stroke-linecap="round"/><line x1="720" y1="756" x2="1080.141864430168" y2="756" stroke="#B23A48" stroke-width="8" stroke-linecap="round"/><circle cx="1080.141864430168" cy="756" r="9" fill="#B23A48" stroke="none" stroke-width="0"/><text x="1066.141864430168" y="745" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="700" fill="#B23A48" text-anchor="end">3.202e-02</text><text x="60" y="900" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="500" fill="#5C6873" text-anchor="start">Source: data/results.csv, 35 runs (7 scenarios × 5 seeds), PyTorch CPU fixture.</text>
</svg>
