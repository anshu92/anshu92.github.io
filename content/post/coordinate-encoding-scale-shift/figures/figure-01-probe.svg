<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700"><title>The coordinate probe</title><desc>The same point pair passes through four encoders and one classifier, then is tested under controlled interventions.</desc><rect width="1200" height="700" fill="white"/><text x="50" y="65" font-size="36" font-family="sans-serif">One relation, four ways to write the coordinates</text><circle cx="110" cy="260" r="16"/><circle cx="250" cy="180" r="16"/><line x1="110" y1="260" x2="250" y2="180" stroke="black" stroke-width="4"/><text x="70" y="320" font-size="22" font-family="sans-serif">point pair</text><g font-family="sans-serif" font-size="22"><rect x="360" y="110" width="260" height="70" fill="#eee"/><text x="390" y="153">raw pixels</text><rect x="360" y="210" width="260" height="70" fill="#eee"/><text x="390" y="253">normalized [0,1]</text><rect x="360" y="310" width="260" height="70" fill="#eee"/><text x="390" y="353">32-bin quantized</text><rect x="360" y="410" width="260" height="70" fill="#eee"/><text x="390" y="453">Fourier features</text><rect x="760" y="250" width="230" height="110" fill="#ddd"/><text x="825" y="315">same MLP</text><text x="760" y="520">Interventions: 2× scale, 4× scale, shifted crop</text></g><path d="M270 220 L350 150 M270 220 L350 250 M270 220 L350 350 M270 220 L350 450" stroke="black" fill="none"/><path d="M630 145 L750 285 M630 245 L750 295 M630 345 L750 305 M630 445 L750 315" stroke="black" fill="none"/></svg>