---
layout: default
---
<main class="blog-post">
  <article>
    <header class="post-header">
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <span class="post-date">{{ page.date | date: "%b %-d, %Y" }}</span>
        {% if page.categories %}
        <span class="post-category">{{ page.categories | join: ', ' }}</span>
        {% endif %}
      </div>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
    <footer class="post-footer">
      {% if page.tags %}
      <div class="post-tags">
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </footer>
  </article>
</main>
