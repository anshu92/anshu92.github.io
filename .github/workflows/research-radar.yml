name: Research radar

on:
  schedule:
    - cron: "37 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: research-radar
  cancel-in-progress: false

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./scripts

      - name: Remove legacy Hugo data artifacts
        run: git rm -r --ignore-unmatch data

      - name: Run research radar
        env:
          BLOGPIPE_REPO_ROOT: ${{ github.workspace }}
          BLOGPIPE_LLM_BASE_URL: ${{ vars.BLOGPIPE_LLM_BASE_URL }}
          BLOGPIPE_LLM_API_KEY: ${{ secrets.BLOGPIPE_LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
          BLOGPIPE_LLM_MODEL: ${{ vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MAX_CALLS: ${{ vars.BLOGPIPE_LLM_MAX_CALLS || '4' }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || vars.CONTACT_EMAIL }}
          AEC_SCHOLAR_RSS: ${{ vars.AEC_SCHOLAR_RSS }}
        run: python -m blogpipe run --window 72h

      - name: Create draft branch and PR
        id: draft_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain content)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            SLUG="$(date -u +%F)-research-radar"
            BR="radar/draft-${SLUG}-${GITHUB_RUN_ID}"
            git checkout -b "$BR"
            git add content radar-data static/img/posts
            if [ -d data ]; then git rm -r --ignore-unmatch data; fi
            git commit -m "chore(blog): draft research radar $SLUG"
            git push -u origin "$BR"
            PR_URL="$(gh pr create \
              --base main \
              --head "$BR" \
              --title "Research radar draft: $SLUG" \
              --body "Automated research radar draft. Review and merge this PR to publish.")"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "$PR_URL" > reports/pr_url.txt
          else
            echo "No generated changes to review."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
          fi

      - name: Send approval email
        if: steps.draft_pr.outputs.pr_url != ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[Research radar draft] approval needed"
          to: ${{ secrets.EMAIL_TO || secrets.EMAIL_USERNAME }}
          from: Research Radar <${{ secrets.EMAIL_USERNAME }}>
          html_body: |
            <p>A new research radar draft is ready for review.</p>
            <p><a href="${{ steps.draft_pr.outputs.pr_url }}">Open the draft PR</a></p>
            <p>Merge the PR to publish it.</p>
