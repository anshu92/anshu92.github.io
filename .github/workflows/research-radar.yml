name: Research radar

on:
  schedule:
    - cron: "37 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: research-radar
  cancel-in-progress: false

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./scripts

      - name: Remove legacy Hugo data artifacts
        run: git rm -r --ignore-unmatch data

      - name: Run research radar
        env:
          BLOGPIPE_REPO_ROOT: ${{ github.workspace }}
          BLOGPIPE_LLM_BASE_URL: ${{ vars.BLOGPIPE_LLM_BASE_URL }}
          BLOGPIPE_LLM_API_KEY: ${{ secrets.BLOGPIPE_LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
          BLOGPIPE_LLM_MODEL: ${{ vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MODEL_SELECTOR: ${{ vars.BLOGPIPE_LLM_MODEL_SELECTOR || vars.BLOGPIPE_LLM_MODEL_FAST || vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MODEL_OUTLINE: ${{ vars.BLOGPIPE_LLM_MODEL_OUTLINE || vars.BLOGPIPE_LLM_MODEL_FAST || vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MODEL_OUTLINE_REPAIR: ${{ vars.BLOGPIPE_LLM_MODEL_OUTLINE_REPAIR || vars.BLOGPIPE_LLM_MODEL_FAST || vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MODEL_DRAFT: ${{ vars.BLOGPIPE_LLM_MODEL_DRAFT || vars.BLOGPIPE_LLM_MODEL_SMART || vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MODEL_DRAFT_SECTION: ${{ vars.BLOGPIPE_LLM_MODEL_DRAFT_SECTION || vars.BLOGPIPE_LLM_MODEL_SMART || vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MODEL_EDITOR: ${{ vars.BLOGPIPE_LLM_MODEL_EDITOR || vars.BLOGPIPE_LLM_MODEL_SMART || vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MODEL_QUALITY_REVIEW: ${{ vars.BLOGPIPE_LLM_MODEL_QUALITY_REVIEW || vars.BLOGPIPE_LLM_MODEL_FAST || vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MODEL_REPAIR: ${{ vars.BLOGPIPE_LLM_MODEL_REPAIR || vars.BLOGPIPE_LLM_MODEL_FAST || vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_CHAIN: ${{ vars.BLOGPIPE_LLM_CHAIN }}
          BLOGPIPE_LLM_CHAIN_SELECTOR: ${{ vars.BLOGPIPE_LLM_CHAIN_SELECTOR }}
          BLOGPIPE_LLM_CHAIN_OUTLINE: ${{ vars.BLOGPIPE_LLM_CHAIN_OUTLINE }}
          BLOGPIPE_LLM_CHAIN_OUTLINE_REPAIR: ${{ vars.BLOGPIPE_LLM_CHAIN_OUTLINE_REPAIR }}
          BLOGPIPE_LLM_CHAIN_DRAFT: ${{ vars.BLOGPIPE_LLM_CHAIN_DRAFT }}
          BLOGPIPE_LLM_CHAIN_DRAFT_SECTION: ${{ vars.BLOGPIPE_LLM_CHAIN_DRAFT_SECTION }}
          BLOGPIPE_LLM_CHAIN_EDITOR: ${{ vars.BLOGPIPE_LLM_CHAIN_EDITOR }}
          BLOGPIPE_LLM_CHAIN_QUALITY_REVIEW: ${{ vars.BLOGPIPE_LLM_CHAIN_QUALITY_REVIEW }}
          BLOGPIPE_LLM_CHAIN_REPAIR: ${{ vars.BLOGPIPE_LLM_CHAIN_REPAIR }}
          BLOGPIPE_LLM_MAX_TOKENS: ${{ vars.BLOGPIPE_LLM_MAX_TOKENS || '4096' }}
          BLOGPIPE_LLM_MAX_CALLS: ${{ vars.BLOGPIPE_LLM_MAX_CALLS || '6' }}
          BLOGPIPE_LLM_MAX_RUNTIME_SECONDS: ${{ vars.BLOGPIPE_LLM_MAX_RUNTIME_SECONDS || '1500' }}
          BLOGPIPE_LLM_FAST_TIMEOUT_SECONDS: ${{ vars.BLOGPIPE_LLM_FAST_TIMEOUT_SECONDS || '45' }}
          BLOGPIPE_LLM_SMART_TIMEOUT_SECONDS: ${{ vars.BLOGPIPE_LLM_SMART_TIMEOUT_SECONDS || '90' }}
          BLOGPIPE_SECTIONWISE_DRAFTING: ${{ vars.BLOGPIPE_SECTIONWISE_DRAFTING || '0' }}
          BLOGPIPE_OPENROUTER_FREE_MODELS: ${{ vars.BLOGPIPE_OPENROUTER_FREE_MODELS }}
          BLOGPIPE_OPENROUTER_DYNAMIC_FREE_MODELS: ${{ vars.BLOGPIPE_OPENROUTER_DYNAMIC_FREE_MODELS || '1' }}
          BLOGPIPE_OPENROUTER_DYNAMIC_FREE_MODEL_LIMIT: ${{ vars.BLOGPIPE_OPENROUTER_DYNAMIC_FREE_MODEL_LIMIT || '16' }}
          BLOGPIPE_OPENROUTER_MODELS_TIMEOUT_SECONDS: ${{ vars.BLOGPIPE_OPENROUTER_MODELS_TIMEOUT_SECONDS || '5' }}
          BLOGPIPE_OPENROUTER_SMART_FALLBACK: ${{ vars.BLOGPIPE_OPENROUTER_SMART_FALLBACK || '1' }}
          BLOGPIPE_LLM_OPENROUTER_TIMEOUT_SECONDS: ${{ vars.BLOGPIPE_LLM_OPENROUTER_TIMEOUT_SECONDS || '120' }}
          BLOGPIPE_OPENROUTER_RATE_LIMIT_FALLBACK_LIMIT: ${{ vars.BLOGPIPE_OPENROUTER_RATE_LIMIT_FALLBACK_LIMIT || '4' }}
          BLOGPIPE_OPENROUTER_RATE_LIMIT_CIRCUIT_BREAKER_HITS: ${{ vars.BLOGPIPE_OPENROUTER_RATE_LIMIT_CIRCUIT_BREAKER_HITS || '3' }}
          BLOGPIPE_LLM_SLOW_OPENROUTER_MIN_BUDGET_SECONDS: ${{ vars.BLOGPIPE_LLM_SLOW_OPENROUTER_MIN_BUDGET_SECONDS || '180' }}
          BLOGPIPE_LLM_RATE_LIMIT_COOLDOWN_SECONDS: ${{ vars.BLOGPIPE_LLM_RATE_LIMIT_COOLDOWN_SECONDS || '20' }}
          BLOGPIPE_AGENT_DEEP_DIVE_MIN_BUDGET_SECONDS: ${{ vars.BLOGPIPE_AGENT_DEEP_DIVE_MIN_BUDGET_SECONDS || '420' }}
          BLOGPIPE_SELECTOR_MAX_TOKENS: ${{ vars.BLOGPIPE_SELECTOR_MAX_TOKENS || '3200' }}
          BLOGPIPE_OUTLINE_MAX_TOKENS: ${{ vars.BLOGPIPE_OUTLINE_MAX_TOKENS || '3200' }}
          OPENROUTER_BASE: ${{ vars.OPENROUTER_BASE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || vars.CONTACT_EMAIL }}
          AEC_SCHOLAR_RSS: ${{ vars.AEC_SCHOLAR_RSS }}
        run: python -m blogpipe run --window 14d

      - name: Create draft branch and PR
        id: draft_pr
        env:
          GH_TOKEN: ${{ secrets.PR_CREATION_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BLOCKED_REPORT="$(find reports -maxdepth 1 -name '*.blocked.json' -print -quit 2>/dev/null || true)"
          POST_CHANGES="$(git status --porcelain content/post)"
          GENERATED_CHANGES="$(git status --porcelain content radar-data static/img/posts)"
          if [[ -n "$POST_CHANGES" ]]; then
            mkdir -p reports
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            SLUG="$(date -u +%F)-research-radar"
            BR="radar/draft-${SLUG}-${GITHUB_RUN_ID}"
            git checkout -b "$BR"
            git add content radar-data static/img/posts
            if [ -d data ]; then git rm -r --ignore-unmatch data; fi
            git commit -m "chore(blog): draft research radar $SLUG"
            git push -u origin "$BR"
            FALLBACK_PR_URL="https://github.com/${GITHUB_REPOSITORY}/pull/new/${BR}"
            if PR_URL="$(gh pr create \
                --base main \
                --head "$BR" \
                --title "Research radar draft: $SLUG" \
                --body "Automated research radar draft. Review and merge this PR to publish." \
                2>reports/pr_create_error.log)"; then
              echo "Created PR: $PR_URL"
            else
              echo "::warning::GitHub CLI could not create a PR. Emailing fallback PR creation URL."
              cat reports/pr_create_error.log
              PR_URL="$FALLBACK_PR_URL"
            fi
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "blocked_report=" >> "$GITHUB_OUTPUT"
            echo "blocked_summary=" >> "$GITHUB_OUTPUT"
            echo "$PR_URL" > reports/pr_url.txt
          elif [[ -n "$BLOCKED_REPORT" ]]; then
            BLOCKED_SUMMARY="$(python -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print("; ".join(data.get("errors", [])[:8]))' "$BLOCKED_REPORT")"
            echo "::warning::Draft generation was blocked by validation."
            echo "$BLOCKED_SUMMARY"
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            echo "blocked_report=$BLOCKED_REPORT" >> "$GITHUB_OUTPUT"
            {
              echo "blocked_summary<<EOF"
              echo "$BLOCKED_SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ -n "$GENERATED_CHANGES" ]]; then
            echo "::warning::Generated radar data/assets changed, but no content/post draft was created. Skipping PR."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            echo "blocked_report=" >> "$GITHUB_OUTPUT"
            echo "blocked_summary=" >> "$GITHUB_OUTPUT"
          else
            echo "No generated changes to review."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            echo "blocked_report=" >> "$GITHUB_OUTPUT"
            echo "blocked_summary=" >> "$GITHUB_OUTPUT"
          fi

      - name: Send approval email
        if: steps.draft_pr.outputs.pr_url != ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[Research radar draft] approval needed"
          to: ${{ secrets.EMAIL_TO || secrets.EMAIL_USERNAME }}
          from: Research Radar <${{ secrets.EMAIL_USERNAME }}>
          html_body: |
            <p>A new research radar draft is ready for review.</p>
            <p><a href="${{ steps.draft_pr.outputs.pr_url }}">Open or create the draft PR</a></p>
            <p>Merge the PR to publish it. If the link opens GitHub's new-PR page, create the PR first.</p>

      - name: Send blocked-run email
        if: steps.draft_pr.outputs.pr_url == '' && steps.draft_pr.outputs.blocked_report != ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[Research radar blocked] validation prevented draft creation"
          to: ${{ secrets.EMAIL_TO || secrets.EMAIL_USERNAME }}
          from: Research Radar <${{ secrets.EMAIL_USERNAME }}>
          html_body: |
            <p>Research radar generation completed, but validation blocked draft creation.</p>
            <p><strong>Summary:</strong> ${{ steps.draft_pr.outputs.blocked_summary }}</p>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Open the workflow run</a></p>
