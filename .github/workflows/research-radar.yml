name: Research radar

on:
  schedule:
    - cron: "37 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: research-radar
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.9
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./scripts

      - name: Run research radar
        env:
          BLOGPIPE_REPO_ROOT: ${{ github.workspace }}
          BLOGPIPE_LLM_BASE_URL: ${{ vars.BLOGPIPE_LLM_BASE_URL }}
          BLOGPIPE_LLM_API_KEY: ${{ secrets.BLOGPIPE_LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
          BLOGPIPE_LLM_MODEL: ${{ vars.BLOGPIPE_LLM_MODEL || vars.BLOGPIPE_MODEL }}
          BLOGPIPE_LLM_MAX_CALLS: ${{ vars.BLOGPIPE_LLM_MAX_CALLS || '4' }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || vars.CONTACT_EMAIL }}
          AEC_SCHOLAR_RSS: ${{ vars.AEC_SCHOLAR_RSS }}
        run: python -m blogpipe run --window 72h

      - name: Commit generated source content
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain content data static/img/posts)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content data static/img/posts
            git commit -m "chore(blog): research radar update"
            git push
          fi

      - name: Install Hugo
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Hugo site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
