name: PR check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.9
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./scripts
          python -m pip install pytest

      - name: Unit tests
        run: PYTHONPATH=scripts pytest -q

      - name: Fixture dry run
        env:
          BLOGPIPE_REPO_ROOT: ${{ github.workspace }}
          BLOGPIPE_FAKE_LLM_RESPONSE: |
            ## What mattered today
            Cache-aware long-context inference reports 35% lower latency on 128k token traces [E1]. Source: https://arxiv.org/abs/2605.00001
            RAG evaluation emphasizes benchmark slices and observability [E3]. Source: https://arxiv.org/abs/2605.00002
            BIM digital twins connect IFC, HVAC, and facility operations [E4]. Source: https://www.research.autodesk.com/blog/bim-digital-twin-controls
            Kernel fusion affects distributed training throughput [E6]. Source: https://pytorch.org/blog/kernel-fusion-training-throughput
            Agent evaluation measures tool-use failures across 500 tasks [E7]. Source: https://openreview.net/forum?id=agent-eval-2026
        run: PYTHONPATH=scripts python -m blogpipe run --fixtures tests/fixtures --dry-run --max-deep-dives 0

      - name: Install Hugo
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Hugo build
        run: hugo --gc --minify
