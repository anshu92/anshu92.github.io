<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Naive FP16 softmax compared with stable max-shifted softmax</title>
  <desc id="desc">The same logits branch into a naive FP16 path that overflows and a stable path that subtracts the maximum, computes in FP32, and returns valid probabilities.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 32px system-ui, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 19px system-ui, sans-serif; fill: #475569; }
      .heading { font: 700 22px system-ui, sans-serif; fill: #0f172a; }
      .body { font: 400 18px system-ui, sans-serif; fill: #1e293b; }
      .mono { font: 600 19px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #0f172a; }
      .small { font: 400 16px system-ui, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke-width: 2; rx: 14; }
    </style>
  </defs>

  <rect width="1200" height="660" fill="#f8fafc"/>
  <text x="60" y="58" class="title">One input, two numerical contracts</text>
  <text x="60" y="91" class="subtitle">Algebraic equivalence does not guarantee equivalent floating-point execution.</text>

  <rect x="430" y="125" width="340" height="82" class="box" stroke="#64748b"/>
  <text x="600" y="158" text-anchor="middle" class="heading">Input logits</text>
  <text x="600" y="188" text-anchor="middle" class="mono">[12, 11, 10]</text>

  <line x1="560" y1="207" x2="305" y2="270" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="207" x2="895" y2="270" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="60" y="275" width="490" height="270" class="box" stroke="#dc2626"/>
  <text x="90" y="316" class="heading" fill="#991b1b">Naïve FP16 path</text>
  <text x="90" y="357" class="mono">exp([12, 11, 10])</text>
  <text x="90" y="396" class="body">exp(12) ≈ 162,755 &gt; 65,504</text>
  <text x="90" y="436" class="mono">[∞, 59,872, 22,032] / ∞</text>
  <rect x="90" y="466" width="430" height="54" rx="10" fill="#fee2e2"/>
  <text x="305" y="501" text-anchor="middle" class="mono" fill="#991b1b">[NaN, 0, 0]</text>

  <rect x="650" y="275" width="490" height="270" class="box" stroke="#16a34a"/>
  <text x="680" y="316" class="heading" fill="#166534">Stable compute-and-reduction path</text>
  <text x="680" y="357" class="mono">x − max(x) = [0, −1, −2]</text>
  <text x="680" y="396" class="body">All exponential inputs are ≤ 0</text>
  <text x="680" y="436" class="mono">[1, e⁻¹, e⁻²] / Σ</text>
  <rect x="680" y="466" width="430" height="54" rx="10" fill="#dcfce7"/>
  <text x="895" y="501" text-anchor="middle" class="mono" fill="#166534">[0.665, 0.245, 0.090]</text>

  <rect x="250" y="580" width="700" height="52" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="600" y="613" text-anchor="middle" class="body">Correctness depends on representable intermediates—not only the equation.</text>
</svg>
