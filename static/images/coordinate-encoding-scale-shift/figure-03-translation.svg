<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650"><title>Translation intervention</title><desc>The same local relation is moved into the upper-right half of a larger canvas, exposing dependence on absolute coordinate range.</desc><rect width="1200" height="650" fill="white"/><text x="50" y="60" font-size="34" font-family="sans-serif">The relation stays; the coordinate range moves</text><rect x="80" y="130" width="400" height="400" fill="none" stroke="black" stroke-width="3"/><circle cx="180" cy="380" r="14"/><circle cx="330" cy="280" r="14"/><line x1="180" y1="380" x2="330" y2="280" stroke="black" stroke-width="4"/><rect x="660" y="100" width="460" height="460" fill="none" stroke="black" stroke-width="3"/><rect x="890" y="100" width="230" height="230" fill="#eee"/><circle cx="940" cy="270" r="14"/><circle cx="1040" cy="190" r="14"/><line x1="940" y1="270" x2="1040" y2="190" stroke="black" stroke-width="4"/><text x="120" y="585" font-size="22" font-family="sans-serif">training range</text><text x="825" y="610" font-size="22" font-family="sans-serif">shifted upper-right crop</text></svg>