<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630"><title>Coordinate encodings under canvas shift</title><desc>Two points retain the same relation while the canvas scale and origin change.</desc><rect width="1200" height="630" fill="#f7f4ee"/><text x="70" y="95" font-size="48" font-family="sans-serif">Pixels Are Not Positions</text><text x="70" y="145" font-size="25" font-family="sans-serif">A scale-and-translation probe for 2D coordinate encodings</text><rect x="90" y="220" width="380" height="280" fill="none" stroke="#333" stroke-width="4"/><circle cx="190" cy="390" r="16"/><circle cx="390" cy="290" r="16"/><line x1="190" y1="390" x2="390" y2="290" stroke="#555" stroke-width="5"/><rect x="650" y="190" width="460" height="340" fill="none" stroke="#333" stroke-width="4"/><circle cx="770" cy="430" r="16"/><circle cx="1010" cy="310" r="16"/><line x1="770" y1="430" x2="1010" y2="310" stroke="#555" stroke-width="5"/><text x="150" y="550" font-size="24" font-family="sans-serif">256 × 256</text><text x="810" y="575" font-size="24" font-family="sans-serif">1024 × 1024, shifted crop</text></svg>